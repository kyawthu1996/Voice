<div id="root" class="min-h-screen flex flex-col"></div>

<script>
  // ------------------------------------------------------------------
  // REACT + LUCIDE ICONS via CDN (React 18, Lucide for icons)
  // ------------------------------------------------------------------
  const loadReactAndLucide = async () => {
    // React & ReactDOM
    const React = await import('https://esm.sh/react@18.2.0');
    const ReactDOM = await import('https://esm.sh/react-dom@18.2.0/client');
    // Lucide react icons
    const lucide = await import('https://esm.sh/lucide-react@0.344.0');
    
    // ----- Helper functions to convert React component to actual rendering -----
    window.React = React;
    window.ReactDOM = ReactDOM;
    window.lucideIcons = lucide;
    
    // define constants and then render
    startApp(React, ReactDOM, lucide);
  };
  
  const startApp = (React, ReactDOM, lucide) => {
    const { useState, useEffect, useRef } = React;
    const { 
      Play, Volume2, Settings, Mic, Sparkles, Download, Info, Trash2, Loader2, 
      FileText, Sliders, AlertTriangle, Compass, ExternalLink 
    } = lucide;
    
    // ---------- CONFIGURATION ----------
    const API_KEY = "";   // User must provide own key (leave empty to show error but still functional? we'll alert)
    const MODEL_NAME = "gemini-2.5-flash-preview-tts";
    
    const VOICE_OPTIONS = [
      { name: "Algenib", style: "Gravelly", description: "အက်ကွဲကွဲနှင့် ကြမ်းတမ်းဆတ်ဆတ် (ဒေါသထွက်သံ သို့မဟုတ် ဆဲဆိုရန်တွေ့သံအတွက် အကောင်းဆုံး)", previewText: "[angry] Listen to me! What on earth are you doing with my phone?! Put it down!" },
      { name: "Gacrux", style: "Mature/Deep", description: "အသံနက်နက် ကြီးကြီး (အသက်ဝင်ပြီး လေးနက်သော လေသံအတွက် သင့်လျော်သည်)", previewText: "[serious] Stop right there. Do not make another move." },
      { name: "Erinome", style: "Clear", description: "စူးရှပြတ်သားပြီး ခနဲ့တဲ့တဲ့ (ရန်တွေ့သံ သို့မဟုတ် အပြစ်တင်သံအတွက် သင့်လျော်သည်)", previewText: "[sarcastically] Oh, beautiful! Just brilliant! You dropped my phone again." },
      { name: "Enceladus", style: "Breathy", description: "အသံနက်နက် နှေးနှေး (တိုးတိုးရေရွတ်သံ သို့မဟုတ် လျှို့ဝှက်သံအတွက် သင့်လျော်သည်)", previewText: "[whispers] Hello. I deliver deep, breathy, and slow emotional reads." }
    ];
    
    const SCENE_PRESETS = [
      { id: "furious", name: "Heated Argument (ရန်ဖြစ်နေသောအခင်းအကျင်း)", notes: "Style: [angry] Very loud, fast, aggressive pacing, gravelly undertones with gasps of air." },
      { id: "sarcastic", name: "Sarcastic Confrontation (ခနဲ့တဲ့တဲ့ ရန်တွေ့ခြင်း)", notes: "Style: [sarcastically] Painfully slow words, mocking tone, sighing heavily between sentences." }
    ];
    
    const POPULAR_TAGS = [
      { tag: "[excitedly]", desc: "စိတ်လှုပ်ရှားသံ" },
      { tag: "[whispers]", desc: "တိုးတိုးပြောသံ" },
      { tag: "[sighs]", desc: "သက်ပြင်းချသံ" },
      { tag: "[laughs]", desc: "ရယ်မောသံ" },
      { tag: "[gasp]", desc: "အံ့သြသံ" },
      { tag: "[shouting]", desc: "အော်ဟစ်သံ" },
      { tag: "[angry]", desc: "ဒေါသတကြီး" },
      { tag: "[sarcastically]", desc: "ခနဲ့တဲ့တဲ့" }
    ];
    
    // ---------- Helper: PCM to WAV ----------
    const pcmToWavBlobUrl = (pcmBase64, sampleRate = 24000) => {
      try {
        const cleanBase64 = pcmBase64.replace(/\s/g, '');
        const binaryString = window.atob(cleanBase64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const buffer = bytes.buffer;
        
        const wavHeader = new ArrayBuffer(44);
        const view = new DataView(wavHeader);
        
        const writeString = (view, offset, string) => {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }
        };
        
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + buffer.byteLength, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, 'data');
        view.setUint32(40, buffer.byteLength, true);
        
        const blob = new Blob([wavHeader, buffer], { type: 'audio/wav' });
        return URL.createObjectURL(blob);
      } catch (e) {
        console.error("PCM error", e);
        throw new Error("WAV conversion failed");
      }
    };
    
    // Main App Component
    const App = () => {
      const [ttsMode, setTtsMode] = useState("single");
      const [customScene, setCustomScene] = useState("An extremely angry, chaotic, and dramatic Burmese rant with heavy breathing and swearing");
      const [singleVoice, setSingleVoice] = useState("Algenib");
      const [multiSpeakers, setMultiSpeakers] = useState([
        { name: "Speaker1", voice: "Algenib" },
        { name: "Speaker2", voice: "Gacrux" }
      ]);
      const [logs, setLogs] = useState([]);
      const addLog = (msg) => {
        setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev].slice(0, 12));
      };
      
      const [promptText, setPromptText] = useState(
        `# THE SCENE: Extremely angry, chaotic, and dramatic Burmese rant with heavy breathing\n# DIRECTOR'S NOTES: [angry] Gravelly voice, emotional, shouting, sighing and laughing naturally.\n\n[excitedly] ဟျောင့် ခဏလေး... [laughs] ငါလိုးမသားလား။ အမလေး... [sighs] ဖေဖေ ငါလိုးမသားသားတွေရာ... ဖုန်းကို ကမ်းခြေက အခင်းပေါ်မှာ ဒီတိုင်း ပစ်ထားခဲ့ရင်... [shouting] ငါလိုးမသား သူခိုးက ခိုးသွားမှာပေါ့ကွ! [laughs] ဟီး... အဲ့လိုမဖြစ်အောင် နည်းလမ်းကောင်းတစ်ခု ပေးမယ်... အရင်ဆုံး ဂေါ်ပြားတစ်ချောင်းယူ... ပြီးရင် လက်တစ်ချောင်းစာလောက်နက်အောင် တူးပြီး စွတ်တိုးပစ်လိုက်... ပြီးမှ ဖုန်းကို အောက်ခြေထဲ ပစ်ချထားလိုက်ဦးမယ်... ဒါပေမဲ့ နေဦး... ဒါနဲ့တင် စိတ်မချရသေးဘူးကွာ... [whispers] ဂေါ်ပြားကို သဲပေါ်မှာ ဒီတိုင်း ပစ်ထားခဲ့ရင်... [shouting] ငါလိုးမသား တစ်ခုက အချောင်ရပြီး အဲ့ဒီဂေါ်ပြားနဲ့ပဲ ပြန်တူးသွားမှာပေါ့ ငါလိုးမသားရဲ့! [sighs] ဟေး... အဲ့ဒါကြောင့် ဖုန်းအပေါ်ကနေပြီး ဂေါ်ပြားကိုပါ ထပ်မြှုပ်ပစ်လိုက်ကွာ... ပြီးရင်တော့ သဲတွေကို လက်နဲ့ပဲ ကုပ်ကပ်ပြီး ပြန်ဖုံး... အပေါ်ကနေ အခင်းလေး ပြန်ခင်းထားလိုက်ကွာ... ကဲ... အားလုံး အိုကေပြီ... ဒါပေမဲ့ မင်းကိုယ်တိုင် ဖုန်းပြန်သုံးချင်တဲ့အချိန်ကျရင်... [gasp] ဂေါ်ပြားမရှိဘဲ ဘယ်လိုပြန်တူးလဲဆိုတာကတော့... ခေါင်းအေးအေးလေးနဲ့ စဉ်းစားလိုက်တော့ကွာ... [laughs] follow လုပ်သွားတဲ့ ငါလိုးမသားတွေ အားလုံး အိုဂျီ ဒီပေါက် နိဗ္ဗာန် ရောက်ပါစေကွာ...`
      );
      
      const [isGenerating, setIsGenerating] = useState(false);
      const [previewingVoiceName, setPreviewingVoiceName] = useState(null);
      const [errorMsg, setErrorMsg] = useState(null);
      const [audioUrl, setAudioUrl] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const audioRef = useRef(null);
      const previewAudioRef = useRef(null);
      const [previewAudioUrl, setPreviewAudioUrl] = useState(null);
      const [isPreviewPlaying, setIsPreviewPlaying] = useState(false);
      
      // Live preview audio load effect
      useEffect(() => {
        if (previewAudioRef.current && previewAudioUrl) {
          previewAudioRef.current.load();
        }
      }, [previewAudioUrl]);
      
      useEffect(() => {
        if (audioRef.current && audioUrl) {
          audioRef.current.load();
        }
      }, [audioUrl]);
      
      const handleCustomSceneChange = (newScene) => {
        setCustomScene(newScene);
        setPromptText(prev => {
          if (prev.includes("# THE SCENE:")) {
            return prev.replace(/^# THE SCENE:[^\n]*/m, `# THE SCENE: ${newScene}`);
          } else {
            return `# THE SCENE: ${newScene}\n${prev}`;
          }
        });
      };
      
      const applyPresetScene = (preset) => {
        setCustomScene(preset.name);
        setPromptText(prev => {
          const textWithoutHeader = prev.replace(/^# THE SCENE:.*?\n# DIRECTOR'S NOTES:.*?\n/s, "");
          return `# THE SCENE: ${preset.name}\n# DIRECTOR'S NOTES: ${preset.notes}\n${textWithoutHeader}`;
        });
        addLog(`Applied scene: ${preset.name}`);
      };
      
      const handlePreviewVoice = async (voiceName) => {
        if (previewingVoiceName === voiceName && isPreviewPlaying) {
          if (previewAudioRef.current) previewAudioRef.current.pause();
          setIsPreviewPlaying(false);
          return;
        }
        setPreviewingVoiceName(voiceName);
        setIsPreviewPlaying(false);
        setErrorMsg(null);
        addLog(`Previewing voice: ${voiceName} ...`);
        const voiceInfo = VOICE_OPTIONS.find(v => v.name === voiceName);
        const textToSpeak = voiceInfo ? voiceInfo.previewText : "Testing voice.";
        
        if (!API_KEY) {
          setErrorMsg("API Key မရှိပါ။ ကိုယ်ပိုင် API Key ထည့်ရန် လိုအပ်သည်။");
          addLog("ERROR: Missing Gemini API Key");
          setPreviewingVoiceName(null);
          return;
        }
        
        const payload = {
          contents: [{ parts: [{ text: textToSpeak }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
          }
        };
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
        try {
          const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error(`Preview failed (${res.status})`);
          const result = await res.json();
          const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
          if (!pcmData) throw new Error("No audio data");
          const wavUrl = pcmToWavBlobUrl(pcmData, 24000);
          setPreviewAudioUrl(wavUrl);
          setTimeout(() => {
            if (previewAudioRef.current) {
              previewAudioRef.current.play().then(() => {
                setIsPreviewPlaying(true);
                addLog(`Preview playing: ${voiceName}`);
              }).catch(e => addLog(`Preview play error: ${e.message}`));
            }
          }, 100);
        } catch (err) {
          setErrorMsg(err.message);
          addLog(`Preview error: ${err.message}`);
          setPreviewingVoiceName(null);
        }
      };
      
      const executeTtsGeneration = async () => {
        if (!API_KEY) {
          setErrorMsg("API Key မရှိပါ။ ကျေးဇူးပြု၍ ကုဒ်အတွင်း apiKey ကို ထည့်ပါ။");
          addLog("ERROR: Gemini API key missing");
          return;
        }
        setIsGenerating(true);
        setErrorMsg(null);
        setAudioUrl(null);
        addLog("Requesting TTS from Gemini API...");
        
        let speechConfig = {};
        if (ttsMode === "single") {
          speechConfig = { voiceConfig: { prebuiltVoiceConfig: { voiceName: singleVoice } } };
        } else {
          speechConfig = {
            multiSpeakerVoiceConfig: {
              speakerVoiceConfigs: multiSpeakers.map(sp => ({
                speaker: sp.name,
                voiceConfig: { prebuiltVoiceConfig: { voiceName: sp.voice } }
              }))
            }
          };
        }
        
        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          generationConfig: { responseModalities: ["AUDIO"], speechConfig: speechConfig }
        };
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
        try {
          const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (!res.ok) {
            const errJson = await res.json().catch(() => ({}));
            throw new Error(errJson.error?.message || `HTTP ${res.status}`);
          }
          const result = await res.json();
          const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
          if (!pcmData) throw new Error("No audio returned from API");
          const wavUrl = pcmToWavBlobUrl(pcmData, 24000);
          setAudioUrl(wavUrl);
          addLog("Audio generation successful!");
        } catch (err) {
          setErrorMsg(err.message);
          addLog(`Generation error: ${err.message}`);
        } finally {
          setIsGenerating(false);
        }
      };
      
      const handleDownload = () => {
        if (!audioUrl) return;
        try {
          const link = document.createElement('a');
          link.href = audioUrl;
          link.download = `gemini-voice-${Date.now()}.wav`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          addLog("Download initiated: .wav file");
        } catch(e) { addLog(`Download failed: ${e.message}`); }
      };
      
      const handleOpenInNewTab = () => {
        if (audioUrl) { window.open(audioUrl, '_blank'); addLog("Opened audio in new tab"); }
      };
      
      const insertTag = (tag) => setPromptText(prev => prev + " " + tag + " ");
      const updateSpeaker = (idx, field, value) => {
        const next = [...multiSpeakers];
        next[idx][field] = value;
        setMultiSpeakers(next);
      };
      const handleAudioPlayback = () => {
        if (!audioRef.current) return;
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play().catch(e => addLog(`Playback error: ${e.message}`));
      };
      
      // Icons JSX wrap
      const Icon = (iconComp, props = {}) => React.createElement(iconComp, { size: props.size || 18, className: props.className || "", ...props });
      
      return React.createElement('div', { className: "min-h-screen bg-slate-950 text-slate-100 flex flex-col" },
        React.createElement('header', { className: "border-b border-slate-800 bg-slate-900/60 backdrop-blur sticky top-0 z-50 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4" },
          React.createElement('div', { className: "flex items-center gap-3" },
            React.createElement('div', { className: "p-2.5 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-xl text-white shadow-lg" }, React.createElement(Mic, { size: 24 })),
            React.createElement('div', null,
              React.createElement('h1', { className: "font-bold text-lg tracking-tight" }, "Gemini Voice Studio"),
              React.createElement('p', { className: "text-xs text-slate-400" }, "စာသားမှ အသံပြောင်းလဲပေးသော စနစ် (API Key လိုအပ်)")
            )
          )
        ),
        React.createElement('audio', { ref: previewAudioRef, src: previewAudioUrl, onPlay: () => setIsPreviewPlaying(true), onPause: () => setIsPreviewPlaying(false), onEnded: () => { setIsPreviewPlaying(false); setPreviewingVoiceName(null); }, className: "hidden" }),
        React.createElement('main', { className: "flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6" },
          // Left panel
          React.createElement('div', { className: "lg:col-span-8 flex flex-col gap-6" },
            React.createElement('div', { className: "bg-slate-900 border border-slate-800 rounded-2xl p-5" },
              React.createElement('h2', { className: "text-sm font-semibold flex items-center gap-1.5 border-b border-slate-800 pb-3 mb-3" }, Icon(Compass, { className: "w-4 h-4 text-indigo-400" }), "Scene အခင်းအကျင်း နောက်ခံသတ်မှတ်ချက်"),
              React.createElement('div', { className: "space-y-4" },
                React.createElement('div', null,
                  React.createElement('label', { className: "block text-xs font-semibold text-slate-400 mb-1.5" }, "အသံနောက်ခံ အခြေအနေကို စိတ်ကြိုက်ရေးသားရန်"),
                  React.createElement('input', { type: "text", value: customScene, onChange: e => handleCustomSceneChange(e.target.value), className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 font-mono" })
                ),
                React.createElement('div', null,
                  React.createElement('span', { className: "block text-[10px] text-slate-500 uppercase tracking-wider font-bold mb-2" }, "ရန်ပွဲ/ခနဲ့သံ ပုံစံနမူနာများ"),
                  React.createElement('div', { className: "flex flex-wrap gap-2" }, SCENE_PRESETS.map(preset => 
                    React.createElement('button', { key: preset.id, onClick: () => applyPresetScene(preset), className: "px-2.5 py-1 text-xs bg-slate-950 border border-slate-800 rounded-lg hover:border-indigo-500 hover:text-indigo-400 transition" }, preset.name)
                  ))
                )
              )
            ),
            // Voice selection + Mode
            React.createElement('div', { className: "bg-slate-900 border border-slate-800 rounded-2xl p-5" },
              React.createElement('div', { className: "flex justify-between items-center border-b border-slate-800 pb-4 mb-4" },
                React.createElement('h2', { className: "text-sm font-semibold flex items-center gap-1.5" }, Icon(Settings, { size: 16, className: "text-indigo-400" }), "အသံရွေးချယ်ရန်"),
